name: ClipboardMobile
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: '18.0'
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: '18.0'
    TARGETED_DEVICE_FAMILY: '1,2'
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ''
packages: {}
targets:
  ClipboardMobile:
    type: application
    platform: iOS
    deploymentTarget: '18.0'
    sources:
      - path: ../iOSApp
      - path: ../Shared
    info:
      path: App-Info.plist
    entitlements:
      path: App.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liangweibin.clipboardmobile
        PRODUCT_NAME: ClipboardMobile
        INFOPLIST_KEY_CFBundleDisplayName: ClipboardMobile
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: ClipboardWidgetExtension
        embed: true
      - target: ClipboardShareExtension
        embed: true

  ClipboardWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: '18.0'
    sources:
      - path: ../WidgetExtension
      - path: ../Shared
    info:
      path: Widget-Info.plist
    entitlements:
      path: Widget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liangweibin.clipboardmobile.widget
        PRODUCT_NAME: ClipboardWidgetExtension
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  ClipboardShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: '18.0'
    sources:
      - path: ../ShareExtension
      - path: ../Shared
    info:
      path: Share-Info.plist
    entitlements:
      path: Share.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liangweibin.clipboardmobile.share
        PRODUCT_NAME: ClipboardShareExtension
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
